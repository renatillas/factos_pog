services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: factos_pog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d factos_pog"]
      interval: 1s
      timeout: 5s
      retries: 20
